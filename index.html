<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>柚子图片混淆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        pomelo: {
                            50: '#fff7ed',
                            100: '#ffedd5',
                            200: '#fed7aa',
                            300: '#fdba74',
                            400: '#fb923c',
                            500: '#f97316',
                            600: '#ea580c',
                            700: '#c2410c',
                        },
                        grapefruit: {
                            50: '#fdf2f8',
                            100: '#fce7f3',
                            500: '#ec4899',
                            600: '#db2777',
                        }
                    }
                }
            }
        }
    </script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Noto+Sans+SC:wght@400;500;700&display=swap');
        body {
            font-family: 'Noto Sans SC', sans-serif;
            background-color: #f8fafc;
        }
        .glass-panel {
            background: rgba(255, 255, 255, 0.95);
            backdrop-filter: blur(10px);
            border: 1px solid rgba(255, 255, 255, 0.2);
        }
        .drop-zone {
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23FB923CFF' stroke-width='2' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
            transition: all 0.3s ease;
        }
        .drop-zone:hover, .drop-zone.active {
            background-color: #fff7ed;
            background-image: url("data:image/svg+xml,%3csvg width='100%25' height='100%25' xmlns='http://www.w3.org/2000/svg'%3e%3crect width='100%25' height='100%25' fill='none' rx='12' ry='12' stroke='%23F97316FF' stroke-width='3' stroke-dasharray='12%2c 12' stroke-dashoffset='0' stroke-linecap='square'/%3e%3c/svg%3e");
        }
        /* Custom Scrollbar */
        ::-webkit-scrollbar {
            width: 6px;
            height: 6px;
        }
        ::-webkit-scrollbar-track {
            background: transparent;
        }
        ::-webkit-scrollbar-thumb {
            background: #cbd5e1;
            border-radius: 3px;
        }
        ::-webkit-scrollbar-thumb:hover {
            background: #94a3b8;
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden text-gray-800">
    <!-- Header -->
    <nav class="bg-white border-b border-gray-100 flex-shrink-0 z-20">
        <div class="max-w-full mx-auto px-6 h-16 flex items-center justify-between">
            <div class="flex items-center space-x-3">
                <span class="text-2xl">🍊</span>
                <span class="text-xl font-bold bg-clip-text text-transparent bg-gradient-to-r from-pomelo-500 to-grapefruit-500">
                    柚子图片混淆
                </span>
            </div>
            <div class="flex items-center space-x-6">

                    GitHub
                </a>
            </div>
        </div>
    </nav>

    <div class="flex-grow flex flex-row h-full overflow-hidden relative">
        <!-- Sidebar: Enhanced Controls -->
        <aside class="w-96 bg-white border-r border-gray-100 flex flex-col shadow-xl z-10 flex-shrink-0 transition-all duration-300 transform">
            <div class="p-6 space-y-8 overflow-y-auto h-full custom-scrollbar">
                
                <!-- Upload Area -->
                <section>
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wide flex items-center gap-2">
                            <span class="w-1.5 h-4 bg-pomelo-500 rounded-full"></span>
                            图片上传
                        </h2>
                        <span id="file-name" class="text-xs text-gray-400 truncate max-w-[120px]"></span>
                    </div>
                    
                    <div id="drop-zone" class="drop-zone rounded-2xl p-8 text-center cursor-pointer group relative overflow-hidden bg-pomelo-50">
                        <input type="file" id="file-input" class="hidden" accept="image/*">
                        <div class="relative z-10 space-y-3 transition-transform group-hover:scale-105 duration-300">
                            <div class="w-16 h-16 bg-white rounded-full flex items-center justify-center mx-auto shadow-sm group-hover:shadow-md transition-shadow">
                                <svg class="h-8 w-8 text-pomelo-500" fill="none" viewBox="0 0 24 24" stroke="currentColor">
                                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16l4.586-4.586a2 2 0 012.828 0L16 16m-2-2l1.586-1.586a2 2 0 012.828 0L20 14m-6-6h.01M6 20h12a2 2 0 002-2V6a2 2 0 00-2-2H6a2 2 0 00-2 2v12a2 2 0 002 2z" />
                                </svg>
                            </div>
                            <div>

                            </div>
                        </div>
                    </div>
                </section>

                <!-- Preview Area (Compact) -->
                <section id="preview-section" class="hidden transition-all duration-500 ease-in-out opacity-0 translate-y-4">
                    <div class="flex items-center justify-between mb-3">
                        <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wide flex items-center gap-2">
                            <span class="w-1.5 h-4 bg-grapefruit-500 rounded-full"></span>
                            原图预览
                        </h2>
                        <span id="image-info" class="text-xs bg-gray-100 px-2 py-1 rounded text-gray-500"></span>
                    </div>
                    <div class="relative rounded-xl overflow-hidden bg-gray-50 border border-gray-100 shadow-inner group">
                        <img id="original-preview" class="w-full max-h-48 object-contain mx-auto transition-transform duration-500 group-hover:scale-105" src="" alt="Original">
                        <div class="absolute inset-0 bg-black/5 opacity-0 group-hover:opacity-100 transition-opacity pointer-events-none"></div>
                    </div>
                </section>

                <!-- Actions -->
                <section class="space-y-4 pt-4 border-t border-dashed border-gray-200">
                    <h2 class="text-sm font-bold text-gray-800 uppercase tracking-wide flex items-center gap-2 mb-4">
                        <span class="w-1.5 h-4 bg-blue-500 rounded-full"></span>
                        核心功能
                    </h2>
                    
                    <div class="grid grid-cols-2 gap-3">
                        <button id="encrypt-btn" class="relative group overflow-hidden w-full py-3 px-4 rounded-xl font-medium text-white bg-gradient-to-br from-pomelo-400 to-pomelo-600 shadow-lg shadow-pomelo-200 hover:shadow-pomelo-300 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                            <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                            <span class="relative flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13.875 18.825A10.05 10.05 0 0112 19c-4.478 0-8.268-2.943-9.543-7a9.97 9.97 0 011.563-3.029m5.858.908a3 3 0 114.243 4.243M9.878 9.878l4.242 4.242M9.88 9.88l-3.29-3.29m7.532 7.532l3.29 3.29M3 3l3.59 3.59m0 0A9.953 9.953 0 0112 5c4.478 0 8.268 2.943 9.543 7a10.025 10.025 0 01-4.132 5.411m0 0L21 21" /></svg>
                                混淆图片
                            </span>
                        </button>
                        
                        <button id="decrypt-btn" class="relative group overflow-hidden w-full py-3 px-4 rounded-xl font-medium text-white bg-gradient-to-br from-grapefruit-400 to-grapefruit-600 shadow-lg shadow-grapefruit-200 hover:shadow-grapefruit-300 transition-all active:scale-95 disabled:opacity-50 disabled:cursor-not-allowed">
                            <div class="absolute inset-0 bg-white/20 translate-y-full group-hover:translate-y-0 transition-transform duration-300"></div>
                            <span class="relative flex items-center justify-center gap-2">
                                <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M15 12a3 3 0 11-6 0 3 3 0 016 0z" /><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M2.458 12C3.732 7.943 7.523 5 12 5c4.478 0 8.268 2.943 9.542 7-1.274 4.057-5.064 7-9.542 7-4.477 0-8.268-2.943-9.542-7z" /></svg>
                                还原混淆
                            </span>
                        </button>
                    </div>
                    
                    <button id="restore-btn" class="w-full py-2.5 px-4 rounded-xl font-medium text-gray-600 bg-white border border-gray-200 hover:bg-gray-50 hover:border-gray-300 transition-colors flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
                        <svg class="w-4 h-4" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 4v5h.582m15.356 2A8.001 8.001 0 004.582 9m0 0H9m11 11v-5h-.581m0 0a8.003 8.003 0 01-15.357-2m15.357 2H15" /></svg>
                        重置为原图
                    </button>

                    <div id="download-actions" class="hidden transition-all duration-500 ease-in-out pt-6 mt-2 opacity-0 translate-y-2">
                         <button id="download-btn" class="w-full py-3 px-4 rounded-xl font-bold text-white bg-green-500 hover:bg-green-600 shadow-lg shadow-green-200 transition-all active:scale-95 flex items-center justify-center gap-2 animate-pulse hover:animate-none">
                            <svg class="w-5 h-5" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 16v1a3 3 0 003 3h10a3 3 0 003-3v-1m-4-4l-4 4m0 0l-4-4m4 4V4" /></svg>
                            下载处理结果
                        </button>
                        <p class="text-xs text-center text-gray-400 mt-3 flex items-center justify-center gap-1">
                            <svg class="w-3 h-3" fill="none" viewBox="0 0 24 24" stroke="currentColor"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M13 16h-1v-4h-1m1-4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z" /></svg>
                            建议保存为 PNG 格式
                        </p>
                    </div>
                </section>
            </div>
            
            <div class="p-4 bg-gray-50 border-t border-gray-100 text-center">
                <p class="text-xs text-gray-400">Powered by Hilbert Curve</p>
            </div>
        </aside>

        <!-- Main Content: Result Preview -->
        <main class="flex-grow bg-gray-50/50 p-6 flex flex-col overflow-hidden relative">
            <div class="flex-grow bg-white/80 backdrop-blur rounded-2xl shadow-sm border border-gray-100 flex items-center justify-center overflow-auto relative p-8 transition-all duration-300" id="result-container">
                
                <!-- Placeholder State -->
                <div id="result-placeholder" class="text-center space-y-4">
                    <div class="w-24 h-24 bg-gray-50 rounded-full flex items-center justify-center mx-auto mb-4 border border-gray-100">
                        <span class="text-5xl opacity-50 grayscale">🖼️</span>
                    </div>
                    <h3 class="text-xl font-medium text-gray-800">等待处理</h3>
                    <p class="text-gray-400 max-w-xs mx-auto text-sm leading-relaxed">
                        请在左侧上传图片并选择混淆或解混淆操作，结果将在此处实时显示。
                    </p>
                </div>

                <!-- Canvas -->
                <canvas id="result-canvas" class="hidden shadow-2xl rounded-lg max-w-full max-h-full object-contain ring-1 ring-gray-900/5"></canvas>
                
                <!-- Loading Overlay -->
                <div id="loading" class="hidden absolute inset-0 bg-white/80 backdrop-blur-sm flex items-center justify-center z-50 rounded-2xl transition-opacity duration-300">
                    <div class="flex flex-col items-center p-8 bg-white rounded-2xl shadow-2xl border border-gray-100">
                        <div class="relative w-16 h-16 mb-4">
                            <div class="absolute inset-0 border-4 border-pomelo-100 rounded-full"></div>
                            <div class="absolute inset-0 border-4 border-pomelo-500 rounded-full border-t-transparent animate-spin"></div>
                        </div>
                        <span class="text-sm font-medium text-gray-600 animate-pulse">正在处理像素...</span>
                    </div>
                </div>
            </div>
        </main>
    </div>

    <script src="hilbert.js"></script>
    <script src="script.js"></script>

        const fileInput = document.getElementById('file-input');

</body>
</html>
