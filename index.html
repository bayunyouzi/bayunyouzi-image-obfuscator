<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>小番茄图片混淆</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        body {
            font-family: 'Inter', sans-serif;
            background-color: #f3f4f6;
        }
        .drop-zone {
            border: 2px dashed #cbd5e1;
            transition: all 0.3s ease;
        }
        .drop-zone.active {
            border-color: #3b82f6;
            background-color: #eff6ff;
        }
        canvas {
            max-width: 100%;
            height: auto;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }
    </style>
</head>
<body class="h-screen flex flex-col overflow-hidden">
    <nav class="bg-white shadow-sm flex-shrink-0 z-10">
        <div class="max-w-full mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex justify-between h-14">
                <div class="flex items-center">
                    <span class="text-lg font-bold text-gray-800">小番茄图片混淆</span>
                </div>
                <div class="flex items-center space-x-4">
                    <a href="https://github.com/bayunyouzi/image-obfuscator" target="_blank" class="text-sm text-gray-500 hover:text-gray-700">GitHub</a>
                </div>
            </div>
        </div>
    </nav>

    <main class="flex-grow flex flex-row h-full overflow-hidden">
        <!-- Sidebar: Upload & Actions (Fixed width) -->
        <div class="w-80 bg-white border-r border-gray-200 flex flex-col p-4 overflow-y-auto shadow-lg z-10 flex-shrink-0">
            <div class="space-y-6">
                <!-- Upload Section -->
                <div>
                    <h2 class="text-sm font-semibold text-gray-700 mb-2">1. 上传图片</h2>
                    <div id="drop-zone" class="drop-zone rounded-lg p-4 text-center cursor-pointer hover:bg-gray-50 border-gray-300">
                        <input type="file" id="file-input" class="hidden" accept="image/*">
                        <div class="space-y-1">
                            <svg class="mx-auto h-8 w-8 text-gray-400" stroke="currentColor" fill="none" viewBox="0 0 48 48" aria-hidden="true">
                                <path d="M28 8H12a4 4 0 00-4 4v20m32-12v8m0 0v8a4 4 0 01-4 4H12a4 4 0 01-4-4v-4m32-4l-3.172-3.172a4 4 0 00-5.656 0L28 28M8 32l9.172-9.172a4 4 0 015.656 0L28 28m0 0l4 4m4-24h8m-4-4v8m-12 4h.02" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" />
                            </svg>
                            <div class="text-xs text-gray-600">
                                <span class="font-medium text-blue-600 hover:text-blue-500">点击上传</span> 或拖拽
                            </div>
                        </div>
                    </div>
                </div>

                <!-- Preview Thumbnail -->
                <div id="preview-container" class="hidden space-y-2">
                    <h3 class="text-xs font-medium text-gray-500">原图预览</h3>
                    <div class="relative rounded-lg overflow-hidden bg-gray-100 border border-gray-200">
                        <img id="original-preview" class="w-full max-h-40 object-contain" src="" alt="Original">
                    </div>
                </div>

                <!-- Actions -->
                <div class="space-y-3 pt-4 border-t border-gray-100">
                    <h2 class="text-sm font-semibold text-gray-700">2. 操作</h2>
                    
                    <div class="grid grid-cols-2 gap-2">
                        <button id="encrypt-btn" class="w-full flex justify-center py-2 px-2 border border-transparent rounded shadow-sm text-sm font-medium text-white bg-purple-600 hover:bg-purple-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-purple-500 disabled:opacity-50 disabled:cursor-not-allowed">
                            混淆
                        </button>
                        <button id="decrypt-btn" class="w-full flex justify-center py-2 px-2 border border-transparent rounded shadow-sm text-sm font-medium text-white bg-pink-600 hover:bg-pink-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-pink-500 disabled:opacity-50 disabled:cursor-not-allowed">
                            解混淆
                        </button>
                    </div>
                    
                    <button id="restore-btn" class="w-full flex justify-center py-2 px-4 border border-gray-300 rounded shadow-sm text-sm font-medium text-gray-700 bg-white hover:bg-gray-50 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-blue-500 disabled:opacity-50 disabled:cursor-not-allowed">
                        还原原图
                    </button>

                    <div id="download-actions" class="hidden pt-4 border-t border-gray-100">
                         <button id="download-btn" class="w-full flex justify-center py-2 px-4 border border-transparent rounded shadow-sm text-sm font-medium text-white bg-green-600 hover:bg-green-700 focus:outline-none focus:ring-2 focus:ring-offset-2 focus:ring-green-500">
                            下载结果
                        </button>
                        <p class="text-xs text-center text-gray-400 mt-2">推荐保存为 PNG 以无损还原</p>
                    </div>
                </div>
            </div>
            
            <div class="mt-auto pt-6 text-xs text-gray-400 text-center">
                基于空间填充曲线算法
            </div>
        </div>

        <!-- Main Content: Result Preview (Fluid) -->
        <div class="flex-grow bg-gray-100 p-4 flex flex-col overflow-hidden relative">
            <div class="flex-grow bg-white rounded-lg shadow-inner border border-gray-200 flex items-center justify-center overflow-auto relative" id="result-container">
                <p class="text-gray-400 text-center" id="result-placeholder">
                    <span class="block text-4xl mb-2">🖼️</span>
                    请先在左侧上传图片<br>处理结果将显示在这里
                </p>
                <canvas id="result-canvas" class="hidden shadow-lg"></canvas>
                
                <!-- Loading Spinner -->
                <div id="loading" class="hidden absolute inset-0 bg-white bg-opacity-75 flex items-center justify-center z-50">
                    <div class="flex flex-col items-center">
                        <div class="animate-spin rounded-full h-12 w-12 border-b-2 border-blue-600 mb-2"></div>
                        <span class="text-sm text-gray-600">正在处理中...</span>
                    </div>
                </div>
            </div>
        </div>
    </main>

    <script src="hilbert.js"></script>
    <script src="script.js"></script>
</body>
</html>
